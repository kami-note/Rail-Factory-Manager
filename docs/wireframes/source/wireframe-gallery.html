<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rail Factory - Wireframe Gallery</title>
    <style>
        :root {
            --bg-board: #e5e5e5;
            --white: #ffffff;
            --gray-100: #f8f9fa;
            --gray-200: #e9ecef;
            --gray-300: #dee2e6;
            --gray-400: #ced4da;
            --gray-500: #adb5bd;
            --gray-600: #6c757d;
            --gray-700: #495057;
            --gray-800: #343a40;
            --gray-900: #212529;
            --primary: #001a41;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            background: var(--bg-board); 
            padding: 80px;
            color: var(--gray-900);
        }

        .gallery-container {
            display: flex;
            gap: 60px;
            align-items: flex-start;
            flex-wrap: nowrap;
        }

        /* Device Frame */
        .device {
            background: var(--white);
            width: 380px; /* Reduced scale for gallery view */
            height: 700px;
            box-shadow: 0 50px 100px -20px rgba(0,0,0,0.25), 0 30px 60px -30px rgba(0,0,0,0.3);
            border-radius: 8px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            position: relative;
            flex-shrink: 0;
            border: 1px solid var(--gray-300);
        }

        .device-label {
            position: absolute;
            top: -40px;
            left: 0;
            font-size: 14px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--gray-700);
        }

        /* Screen Elements */
        .header { height: 32px; background: var(--primary); padding: 0 12px; display: flex; align-items: center; justify-content: space-between; }
        .logo { width: 40px; height: 8px; background: rgba(255,255,255,0.3); border-radius: 2px; }
        .user-circle { width: 16px; height: 16px; background: white; border-radius: 50%; }

        .sidebar { width: 80px; border-right: 1px solid var(--gray-200); background: var(--white); padding: 12px 8px; }
        .nav-item { height: 6px; background: var(--gray-200); margin-bottom: 12px; border-radius: 3px; width: 100%; }
        .nav-item.active { background: var(--primary); opacity: 0.1; }

        .content { flex: 1; background: var(--gray-100); padding: 16px; overflow: hidden; }

        /* Placeholders */
        .placeholder-img { background: var(--gray-300); border-radius: 4px; display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; }
        .placeholder-img::after { content: ""; position: absolute; width: 140%; height: 1px; background: var(--gray-400); transform: rotate(45deg); }
        .placeholder-img::before { content: ""; position: absolute; width: 140%; height: 1px; background: var(--gray-400); transform: rotate(-45deg); }

        .text-block { background: var(--gray-300); height: 8px; border-radius: 4px; margin-bottom: 8px; }
        .text-block.title { height: 12px; background: var(--gray-400); width: 60%; margin-bottom: 12px; }
        .text-block.short { width: 40%; }

        /* View 1: Login/Tenant */
        .view-login { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; padding: 40px; text-align: center; }
        .login-card { background: white; border: 1px solid var(--gray-300); width: 100%; padding: 24px; border-radius: 4px; }
        .btn-mock { background: var(--gray-800); height: 32px; border-radius: 4px; width: 100%; margin-top: 20px; }

        /* View 2: Dashboard */
        .kpi-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 16px; }
        .kpi-mock { background: white; border: 1px solid var(--gray-300); padding: 12px; border-radius: 4px; }
        .hero-mock { background: white; border: 1px solid var(--gray-300); padding: 24px; border-radius: 4px; height: 200px; }

        /* View 3: Workbench */
        .wb-layout { display: flex; gap: 8px; height: 100%; }
        .wb-side { width: 30%; border-right: 1px solid var(--gray-200); }
        .wb-main { flex: 1; }
        .wb-item { padding: 8px; border-bottom: 1px solid var(--gray-200); }

        /* Custom scrollbar for better look */
        ::-webkit-scrollbar { width: 0px; }

    </style>
</head>
<body>

    <div class="gallery-container">
        
        <!-- SCREEN 1: PORTAL DE ACESSO -->
        <div class="device">
            <div class="device-label">01. Portal de Acesso</div>
            <div class="view-login">
                <div style="width: 40px; height: 40px; background: var(--primary); margin-bottom: 24px; border-radius: 4px;"></div>
                <div class="text-block title" style="width: 100%; height: 20px;"></div>
                <div class="text-block" style="width: 80%;"></div>
                
                <div class="login-card" style="margin-top: 30px;">
                    <div class="text-block" style="width: 100%; height: 10px; margin-bottom: 20px; background: var(--gray-200);"></div>
                    <div style="border: 1px solid var(--gray-300); height: 32px; border-radius: 4px; display: flex; align-items: center; padding: 0 8px;">
                        <div style="width: 12px; height: 12px; background: var(--gray-400); border-radius: 2px;"></div>
                        <div class="text-block" style="width: 60%; margin: 0 0 0 8px; height: 6px;"></div>
                    </div>
                    <div class="btn-mock" style="background: var(--primary);"></div>
                </div>
            </div>
        </div>

        <!-- SCREEN 2: DASHBOARD OPERACIONAL -->
        <div class="device">
            <div class="device-label">02. Visão Geral</div>
            <div class="header">
                <div class="logo"></div>
                <div class="user-circle"></div>
            </div>
            <div style="display: flex; flex: 1;">
                <div class="sidebar">
                    <div class="nav-item active"></div>
                    <div class="nav-item"></div>
                    <div class="nav-item"></div>
                    <div class="nav-item"></div>
                    <div style="margin-top: auto;">
                        <div class="nav-item"></div>
                    </div>
                </div>
                <div class="content">
                    <div class="text-block title"></div>
                    <div class="kpi-row">
                        <div class="kpi-mock">
                            <div class="text-block short" style="height: 4px;"></div>
                            <div class="text-block title" style="margin: 8px 0 0 0; width: 30%;"></div>
                        </div>
                        <div class="kpi-mock">
                            <div class="text-block short" style="height: 4px;"></div>
                            <div class="text-block title" style="margin: 8px 0 0 0; width: 30%;"></div>
                        </div>
                    </div>
                    <div class="hero-mock">
                        <div class="placeholder-img" style="height: 80px; margin-bottom: 16px;"></div>
                        <div class="text-block title" style="width: 80%;"></div>
                        <div class="text-block"></div>
                        <div class="text-block short"></div>
                        <div class="btn-mock" style="width: 50%; height: 24px; margin-top: 12px;"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- SCREEN 3: BANCADA DE ASSOCIAÇÃO -->
        <div class="device" style="width: 600px;"> <!-- Expanded for complex screen -->
            <div class="device-label">03. Bancada de Associação (Operational)</div>
            <div class="header">
                <div class="logo"></div>
                <div class="user-circle"></div>
            </div>
            <div style="display: flex; flex: 1;">
                <div class="sidebar" style="width: 60px;">
                    <div class="nav-item"></div>
                    <div class="nav-item active"></div>
                    <div class="nav-item"></div>
                </div>
                <div class="content" style="padding: 0; display: flex;">
                    <!-- Workbench Layout -->
                    <div style="width: 25%; background: white; border-right: 1px solid var(--gray-300);">
                        <div style="padding: 12px; border-bottom: 1px solid var(--gray-200); background: var(--gray-100);">
                            <div class="text-block" style="width: 80%; height: 6px;"></div>
                        </div>
                        <div class="wb-item" style="background: rgba(0,120,212,0.05); border-left: 3px solid var(--primary);">
                            <div class="text-block title" style="height: 8px; width: 60%;"></div>
                            <div class="text-block short" style="height: 4px;"></div>
                        </div>
                        <div class="wb-item"><div class="text-block title" style="height: 8px; width: 50%;"></div></div>
                        <div class="wb-item"><div class="text-block title" style="height: 8px; width: 70%;"></div></div>
                    </div>
                    <div style="flex: 1; display: flex; flex-direction: column;">
                        <div style="padding: 12px; background: white; border-bottom: 1px solid var(--gray-300); display: flex; justify-content: space-between;">
                            <div class="text-block title" style="margin: 0; width: 40%;"></div>
                            <div style="width: 60px; height: 16px; background: var(--primary); border-radius: 2px;"></div>
                        </div>
                        <div style="padding: 12px;">
                            <!-- Table Mock -->
                            <div style="background: white; border: 1px solid var(--gray-300);">
                                <div style="display: flex; border-bottom: 1px solid var(--gray-300); padding: 8px; background: var(--gray-100);">
                                    <div style="width: 20%; height: 6px; background: var(--gray-400);"></div>
                                    <div style="width: 40%; height: 6px; background: var(--gray-400); margin-left: 8px;"></div>
                                    <div style="width: 20%; height: 6px; background: var(--gray-400); margin-left: 8px;"></div>
                                </div>
                                <div style="display: flex; padding: 8px; border-bottom: 1px solid var(--gray-200);">
                                    <div style="width: 20%; height: 6px; background: var(--gray-300);"></div>
                                    <div style="width: 40%; height: 6px; background: var(--gray-300); margin-left: 8px;"></div>
                                    <div style="width: 20%; height: 6px; background: var(--gray-300); margin-left: 8px;"></div>
                                </div>
                                <div style="display: flex; padding: 8px; background: rgba(0,0,0,0.02);">
                                    <div style="width: 20%; height: 6px; background: var(--gray-300);"></div>
                                    <div style="width: 40%; height: 6px; background: var(--gray-300); margin-left: 8px;"></div>
                                    <div style="width: 20%; height: 6px; background: var(--gray-300); margin-left: 8px;"></div>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div style="width: 30%; background: white; border-left: 1px solid var(--gray-300); padding: 16px;">
                        <div class="text-block short" style="color: var(--gray-500); margin-bottom: 12px;"></div>
                        <div class="text-block title" style="width: 100%;"></div>
                        <div class="placeholder-img" style="height: 100px; margin: 16px 0;"></div>
                        <div class="btn-mock" style="background: var(--primary);"></div>
                        <div style="display: flex; gap: 4px; margin-top: 8px;">
                            <div class="btn-mock" style="height: 20px; background: var(--gray-300);"></div>
                            <div class="btn-mock" style="height: 20px; background: var(--gray-300);"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

    </div>

</body>
</html>
