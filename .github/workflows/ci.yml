name: CI

on:
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Install frontend dependencies
        run: npm ci
        working-directory: src/RailFactory.Frontend/App

      - name: Restore
        run: dotnet restore src/RailFactory.Fork.sln

      - name: Build
        run: dotnet build src/RailFactory.Fork.sln --no-restore --configuration Release

      - name: Test
        run: dotnet test src/RailFactory.Fork.sln --no-build --configuration Release --verbosity normal
